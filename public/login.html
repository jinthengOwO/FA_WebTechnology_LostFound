<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Login - Campus Lost & Found</title>
    <link rel="stylesheet" href="loginstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="home.html" class="logo">🔍QIU Campus Lost & Found</a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="index.html">Items</a>
            <a href="about.html">About</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-image">
            <div class="login-image-overlay">
                <h2 class="overlay-title">User Portal</h2>
                <p class="overlay-text">Manage campus lost & found reports efficiently and securely.</p>
            </div>
        </div>

        <div class="login-form-wrapper">
            <a href="home.html" class="login-logo">← Back to Home</a>
            
            <h1 class="form-title" id="formTitle">Welcome Back</h1>
            <p class="form-subtitle" id="formSubtitle">Please enter your details to sign in.</p>
            
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>

            <form id="authForm">
                <div class="input-group" id="name-group" style="display: none;">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="e.g. John Doe">
                </div>
                
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="student@qiu.edu.my" required>
                </div>
                
                <div class="input-group">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label id="passwordLabel">Password</label>
                        <a href="#" id="forgotLink" onclick="showForgotForm()" style="font-size: 0.8rem; color: #3B82F6; text-decoration: none;">Forgot Password?</a>
                    </div>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Min 8 characters" required>
                        <i class="fa-regular fa-eye-slash toggle-eye" onclick="togglePassword('password', this)"></i>
                    </div>
                </div>
                
                <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
            </form>

            <p class="toggle-text" id="toggleText">
                Don't have an account? <span onclick="toggleMode()">Create one</span>
            </p>
        </div>
    </div>

    <script>
        let isLoginMode = true;
        let isForgotMode = false; 

        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const nameGroup = document.getElementById('name-group');
        const nameInput = document.getElementById('name');
        const submitBtn = document.getElementById('submitBtn');
        const toggleText = document.getElementById('toggleText');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const passwordLabel = document.getElementById('passwordLabel');
        const forgotLink = document.getElementById('forgotLink');

        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text"; 
                icon.classList.remove("fa-eye-slash"); 
                icon.classList.add("fa-eye");          
            } else {
                input.type = "password"; 
                icon.classList.remove("fa-eye");       
                icon.classList.add("fa-eye-slash");    
            }
        }

        function toggleMode() {
            if (isForgotMode) {
                isForgotMode = false;
                isLoginMode = true;
            } else {
                isLoginMode = !isLoginMode;
            }
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (isLoginMode) {
                formTitle.innerText = 'Welcome Back';
                formSubtitle.innerText = 'Please enter your details to sign in.';
                nameGroup.style.display = 'none';
                nameInput.removeAttribute('required');
                passwordLabel.innerText = 'Password';
                forgotLink.style.display = 'block';
                submitBtn.innerText = 'Sign In';
                toggleText.innerHTML = `Don't have an account? <span onclick="toggleMode()">Create one</span>`;
            } else {
                formTitle.innerText = 'Create Account';
                formSubtitle.innerText = 'Set up your user access below.';
                nameGroup.style.display = 'block';
                nameInput.setAttribute('required', 'true');
                passwordLabel.innerText = 'Password';
                forgotLink.style.display = 'none';
                submitBtn.innerText = 'Sign Up';
                toggleText.innerHTML = `Already have an account? <span onclick="toggleMode()">Sign in</span>`;
            }
        }

        function showForgotForm() {
            isForgotMode = true;
            isLoginMode = false;
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            formTitle.innerText = 'Reset Password';
            formSubtitle.innerText = 'Enter your email to set a new password.';
            nameGroup.style.display = 'none';
            nameInput.removeAttribute('required');
            
            passwordLabel.innerText = 'New Password';
            forgotLink.style.display = 'none';
            
            submitBtn.innerText = 'Reset Password';
            toggleText.innerHTML = `Remembered your password? <span onclick="toggleMode()">Sign in</span>`;
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value.trim();

            // Front-end verification
            if (!email.endsWith('@qiu.edu.my')) {
                errorMsg.innerText = "Error: Only @qiu.edu.my email addresses are allowed.";
                errorMsg.style.display = 'block';
                return;
            }
            if (password.length < 8) {
                errorMsg.innerText = "Error: Password must be at least 8 characters long.";
                errorMsg.style.display = 'block';
                return;
            }

            //interface based on the mode
            let endpoint;
            let bodyData;

            if (isForgotMode) {
                endpoint = '/api/auth/forgot-password';
                bodyData = { email, newPassword: password };
            } else {
                endpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';
                bodyData = isLoginMode ? { email, password } : { name, email, password };
            }

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                const data = await response.json();

                if (data.success) {
                    if (isForgotMode) {
                        successMsg.innerText = "Password reset successful! Please sign in.";
                        successMsg.style.display = 'block';
                        setTimeout(() => toggleMode(), 2000); // Redirecting back to login in 2 seconds
                    } else if (isLoginMode) {
                        localStorage.setItem('adminUser', JSON.stringify(data.user));
                        successMsg.innerText = "Login successful! Redirecting...";
                        successMsg.style.display = 'block';
                        setTimeout(() => { window.location.href = 'userdashboard.html'; }, 1000);
                    } else {
                        alert("Account created successfully! Please sign in.");
                        toggleMode();
                    }
                } else {
                    errorMsg.innerText = data.message || "An error occurred.";
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.innerText = "Server error. Is your backend running?";
                errorMsg.style.display = 'block';
            }
        });
        document.addEventListener('DOMContentLoaded', () => {
            const userData = localStorage.getItem('adminUser');
            if (userData) {
                if (window.location.pathname.includes('login.html') || window.location.pathname === '/' || window.location.pathname === '') {
                    window.location.href = 'userdashboard.html';
                }
            }
        });
    </script>
</body>
</html>
