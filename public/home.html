<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome - Campus Lost & Found</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .hero-section {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(135deg, #1a73e8, #4caf50); 
            color: white;
            border-radius: 12px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .hero-section h1 {
            color: white;
            font-size: 2.8em;
            margin-bottom: 20px;
        }
        .hero-section p {
            font-size: 1.2em;
            max-width: 700px;
            margin: 0 auto 30px;
            line-height: 1.6;
        }
        .hero-btns .btn {
            margin: 0 10px;
            font-size: 1.1em;
            padding: 12px 30px;
            background-color: white;
            color: #1a73e8;
            font-weight: bold;
        }
        .hero-btns .btn:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>
<body id="home-page">
<nav class="navbar">
        <a href="home.html" class="logo">🔍QIU Campus Lost & Found</a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="index.html">Items</a>
            <a href="about.html">About</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <section class="hero-section">
    <div class="hero-content">
        <h1 class="hero-title">Find what you lost.<br>Return what you found.</h1>
        
        <p class="hero-subtitle">
            A centralized platform for our campus community to quickly report missing items, organize found objects, and reunite them with their rightful owners.
        </p>

        <div class="hero-buttons">
            <a href="index.html" class="btn-hero-primary">Browse Items &nbsp;→</a>
            <a href="post.html" class="btn-hero-secondary">Report an Item &nbsp;→</a>
        </div>
    </div>

    <div class="hero-image-wrapper">
        <img src="https://images.unsplash.com/photo-1586281380349-632531db7ed4?q=80&w=1000&auto=format&fit=crop" alt="Lost and Found Dashboard" class="hero-img">
    </div>
</section>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const userData = localStorage.getItem('adminUser');
        const authLink = document.querySelector('.nav-links a[href="login.html"], .nav-links a[href="userdashboard.html"]');
        
        if (authLink) {
            if (userData) {
                authLink.href = 'userdashboard.html';
                authLink.innerText = 'Dashboard';
                if (window.location.pathname.includes('login.html')) {
                    window.location.href = 'userdashboard.html';
                }
            } else {
                authLink.href = 'login.html';
                authLink.innerText = 'Login';
            }
        }
    });
</script>
</body>
</html>
