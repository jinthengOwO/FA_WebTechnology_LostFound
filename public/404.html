<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found - Campus Lost & Found</title>
    <style>
        :root {
            --primary-color: #4F46E5; 
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;      
            --card-bg: #FFFFFF;
            --text-main: #1F2937;     
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .navbar {
            background-color: var(--card-bg);
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            position: relative;
            z-index: 1000;
            width: 100%;
        }

        .navbar .logo {
            color: var(--primary-color);
            font-size: 22px;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
            align-items: center;
        }

        .nav-links li {
            display: inline-block;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 25px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .nav-links a:hover { 
            color: var(--primary-color); 
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-block;
            text-decoration: none;
        }

        .btn:hover { 
            background-color: var(--primary-hover); 
            transform: translateY(-2px); 
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .error-container {
            text-align: center;
            padding: 80px 20px;
            max-width: 600px;
            margin: 40px auto;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        
        .error-container h1 {
            font-size: 6rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            line-height: 1;
            font-weight: 900;
        }
        
        .error-container h2 {
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 15px;
        }
        
        .error-container p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            .nav-links a {
                margin: 0 10px;
            }
            .error-container h1 {
                font-size: 4.5rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="home.html" class="logo">🔍QIU Campus Lost & Found</a>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="index.html">Items</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="userdashboard.html">Dashboard</a></li>
        </ul>
    </nav>

    <div class="error-container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <a href="home.html" class="btn">← Back to Home</a>
    </div>
</body>
</html>
