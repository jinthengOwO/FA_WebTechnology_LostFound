<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Item - Campus Lost & Found</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast" class="toast">Successfully Posted! Redirecting...</div>
    <nav class="navbar">
        <a href="home.html" class="logo">🔍QIU Campus Lost & Found</a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="index.html">Items</a> 
            <a href="about.html">About</a>
            <a href="userdashboard.html">Dashboard</a>
        </div>
    </nav>

    <h1 style="text-align: center; margin-top: 30px; margin-bottom: 20px;">Post Item</h1>
    <div class="item-card" style="max-width: 600px; margin: 0 auto;">
        <form id="postForm">
            <div class="form-group">
                <label>Category</label>
                <select id="category" required>
                    <option value="Lost">Lost</option>
                    <option value="Found">Found</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="title" required maxlength="30" placeholder="e.g. Earphone">
            </div>
            
            <div class="form-group">
                <label for="image">📸 Upload Image (Optional)</label>
                <input type="file" id="image" accept="image/*" style="padding: 10px; background: white; cursor: pointer;">
            </div>
            
            <div class="form-group">
                <label>Date</label>
                <input type="date" id="date" required>
            </div>
            
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="location" required maxlength="30" placeholder="ASB/TTS">
            </div>
            
            <div class="f s     orm-group">
                <label>Description</label>
                <textarea id="description" required maxlength="100" placeholder="Describe the item (Max 100 characters)"></textarea>
                <div id="charCount" style="text-align: right; font-size: 0.85rem; color: #6B7280; margin-top: 5px; font-weight: 600;">0/100</div>
            </div>
            
            <div class="form-group">
                <label>Contact Information</label>
                <input type="text" id="contactInfo" required maxlength="30" placeholder="Email, Whatsapp, Ig, Phone">
            </div>
            
            <div class="form-group">
                <label>Submitted By (Auto-filled)</label>
                <input type="text" id="submittedBy" disabled>
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" class="btn" style="flex: 1;">Submit</button>
                <button type="button" class="btn" style="flex: 1; background-color: #6B7280;" onclick="window.location.href='index.html'">Cancel</button>
            </div>
        </form>
    </div>

    <script>
        //check login
        const userDataStr = localStorage.getItem('adminUser');
        if (!userDataStr) {
            alert("Please login first to post an item!");
            window.location.href = 'login.html'; 
        } else {
            const currentUser = JSON.parse(userDataStr);
            document.getElementById('submittedBy').value = currentUser.name;

            const descriptionInput = document.getElementById('description');
            const charCountDisplay = document.getElementById('charCount');

            descriptionInput.addEventListener('input', function() {
                const currentLength = this.value.length;
                charCountDisplay.textContent = `${currentLength}/100`;
                
               //turn warning
                if (currentLength === 100) {
                    charCountDisplay.style.color = '#EF4444'; // red
                } else {
                    charCountDisplay.style.color = '#6B7280'; // grey
                }
            });

            // Image files are converted Base64 strings.
            function convertToBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = error => reject(error);
                });
            }

            document.getElementById('postForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const formData = {
                    category: document.getElementById('category').value,
                    title: document.getElementById('title').value,
                    date: document.getElementById('date').value,
                    location: document.getElementById('location').value,
                    description: document.getElementById('description').value,
                    contactInfo: document.getElementById('contactInfo').value,
                    submittedBy: currentUser.name, 
                    status: 'Active'
                };

                const imageFile = document.getElementById('image').files[0];
                
                if (imageFile) {
                    formData.imageUrl = await convertToBase64(imageFile);
                }

                // Send to backend
                try {
                    const response = await fetch('/api/items', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    
                    if (response.ok) {
                        alert("Successfully Posted!"); 
                        window.location.href = 'index.html'; 
                    } else {
                        alert("Failed to post. Please try again.");
                    }
                } catch (error) {
                    alert("Server error!");
                }
            });
        }
    </script>
</body>
</html>
